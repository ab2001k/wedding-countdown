<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Websites | By Abhik Dutta</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 stroke=%22gold%22 stroke-width=%2210%22 fill=%22none%22/></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&family=Dancing+Script:wght@500;700&family=Lora:ital@0;1&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* --- 1. DYNAMIC THEME VARIABLES --- */
        body.theme-royal {
            --primary: #D4AF37; 
            --primary-shine: #FFFACD;
            --text-main: #fff0f5; 
            --glass: rgba(0, 0, 0, 0.4);
            --font-title: 'Great Vibes', cursive;
            --font-head: 'Cinzel', serif;
            --font-body: 'Lato', sans-serif;
            --bg-overlay: rgba(20, 10, 10, 0.75);
            /* New Royal Background */
            background-image: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=1920&q=80');
        }

        body.theme-elegant {
            --primary: #8ab4f8; 
            --primary-shine: #ffffff;
            --text-main: #ffffff; 
            --glass: rgba(10, 20, 40, 0.5);
            --font-title: 'Playfair Display', serif;
            --font-head: 'Montserrat', sans-serif;
            --font-body: 'Montserrat', sans-serif;
            --bg-overlay: rgba(10, 20, 30, 0.6);
            background-image: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('https://images.unsplash.com/photo-1544928147-79a2dbc1f389?auto=format&fit=crop&w=1920&q=80');
        }

        body.theme-rustic {
            --primary: #c9a96e; 
            --primary-shine: #f4e8d1;
            --text-main: #fdfaf6; 
            --glass: rgba(40, 30, 20, 0.6);
            --font-title: 'Dancing Script', cursive;
            --font-head: 'Lora', serif;
            --font-body: 'Lora', serif;
            --bg-overlay: rgba(30, 40, 30, 0.7);
            background-image: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?auto=format&fit=crop&w=1920&q=80');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: background-image 0.5s ease-in-out; }

        body {
            font-family: var(--font-body);
            color: var(--text-main);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 100px; /* Space for nav bar */
        }

        /* --- CREATOR BRANDING BADGE --- */
        .creator-badge {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--primary);
            color: var(--primary-shine);
            padding: 10px 18px;
            border-radius: 50px;
            font-family: var(--font-body);
            font-size: 0.85rem;
            z-index: 1000;
            backdrop-filter: blur(5px);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .creator-badge:hover { transform: scale(1.05); }
        .creator-badge span { font-weight: bold; color: var(--primary); }

        /* --- ROSE PETALS --- */
        #petal-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; overflow: hidden;
            display: none; 
        }
        .petal {
            position: absolute;
            background-image: url('https://pngimg.com/uploads/rose/rose_PNG686.png');
            background-size: contain; background-repeat: no-repeat;
            opacity: 0.9; animation: falling linear infinite;
        }
        @keyframes falling {
            0% { transform: translate(0, -10vh) rotate(0deg) rotateX(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(20px, 110vh) rotate(360deg) rotateX(180deg); opacity: 0; }
        }

        /* --- MAIN LAYOUT --- */
        .hero {
            position: relative; width: 100%; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh; justify-content: center;
            padding: 80px 20px 40px; z-index: 5;
        }

        .content {
            text-align: center; width: 100%; max-width: 600px; margin-bottom: 20px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .pre-title {
            font-family: var(--font-head); font-size: 1rem; letter-spacing: 5px;
            color: var(--primary); margin-bottom: 20px; text-transform: uppercase;
        }

        .names {
            font-family: var(--font-title); font-size: clamp(3.5rem, 12vw, 6rem); 
            color: var(--primary-shine); line-height: 1.1; margin-bottom: 25px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6); display: flex;
            flex-direction: column; align-items: center; justify-content: center; width: 100%;
        }
        .names .amp { font-size: 0.6em; color: var(--primary); margin: 5px 0; font-family: var(--font-body); }
        @media (min-width: 768px) { .names { flex-direction: row; gap: 15px; } .names .amp { margin: 0 10px; } }

        .date-location {
            font-family: var(--font-head); font-size: clamp(1rem, 4vw, 1.5rem); font-weight: 700; 
            color: var(--text-main); border-top: 2px solid var(--primary); border-bottom: 2px solid var(--primary); 
            padding: 15px 30px; margin-bottom: 50px; background: var(--glass);
            backdrop-filter: blur(4px); display: inline-block; text-align: center; line-height: 1.5;
        }

        /* --- COUNTDOWN --- */
        .countdown {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
            margin-bottom: 60px; width: 100%; max-width: 500px;
        }
        @media (max-width: 400px) {
            .countdown { gap: 8px; }
            .time-box { border-radius: 6px; }
            .time-content h2 { font-size: 1.3rem !important; }
        }

        .time-box {
            position: relative; background: var(--glass); padding: 2px; 
            border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .time-box::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--primary));
            animation: rotateBorder 4s linear infinite;
        }
        .time-box::after {
            content: ''; position: absolute; inset: 2px; background: var(--glass); 
            border-radius: 6px; z-index: 0;
        }
        .time-content { position: relative; z-index: 1; padding: 15px 5px; }
        .time-content h2 { font-family: var(--font-head); font-size: 1.8rem; color: var(--primary); margin: 0; }
        .time-content p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.7); margin: 2px 0 0; }

        @keyframes rotateBorder { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MUSIC & CELEBRATE --- */
        .music-control {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(0,0,0,0.6); border: 1px solid var(--primary);
            width: 44px; height: 44px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
            transition: transform 0.3s ease;
        }
        .music-control:hover { transform: scale(1.05); }
        .music-control svg { fill: var(--primary); width: 20px; height: 20px; }
        .music-control.playing svg { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .celebrate-btn {
            background: transparent; color: var(--primary-shine);
            border: 2px solid var(--primary); padding: 15px 40px; 
            font-family: var(--font-head); font-weight: 700; font-size: 1.1rem;
            letter-spacing: 1px; border-radius: 50px; cursor: pointer;
            transition: all 0.3s; position: relative; z-index: 10;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
        }
        .celebrate-btn:hover { background: var(--primary); color: #000; }
        .celebrate-btn:active { transform: scale(0.96); }

        /* --- PHOTO SECTION --- */
        .photo-section { display: flex; flex-direction: column; align-items: center; margin-top: 80px; width: 100%; }
        .frame {
            background: #fff; padding: 10px 10px 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transform: rotate(-2deg); max-width: 90%; width: 350px; margin-bottom: 25px;
        }
        .frame img { width: 100%; display: block; border: 1px solid #eee; object-fit: cover; height: 250px;}
        .frame-text { text-align:center; font-family: var(--font-title); font-size:1.8rem; margin-top:10px; color:#333;}

        /* --- SHOWCASE DEMO NAVIGATION (MOBILE/PC OPTIMIZED) --- */
        .demo-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95); border-top: 1px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; z-index: 1000; font-family: 'Lato', sans-serif;
            backdrop-filter: blur(10px);
        }
        .nav-btn {
            background: var(--primary); color: #000; border: none;
            padding: 12px 20px; border-radius: 5px; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .nav-btn:active { transform: translateY(0); }
        .demo-indicator { color: white; font-size: 0.95rem; letter-spacing: 1px; font-weight: bold; text-align: center; }

        @media (max-width: 600px) {
            .demo-nav { padding: 12px 15px; }
            .nav-btn { padding: 10px 12px; font-size: 0.75rem; }
            .demo-indicator { font-size: 0.85rem; }
        }

    </style>
</head>
<body class="theme-royal" id="bodyElement">

    <a href="https://ab2001k.github.io/visit/" target="_blank" class="creator-badge">
        Design by <span>Abhik Dutta</span>
    </a>

    <div id="petal-container"></div>

    <div class="music-control" id="musicToggle" title="Toggle Music">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pauseIcon" style="display:none;" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </div>

    <div class="hero">
        <div class="content">
            <p class="pre-title">We Are Getting Married</p>
            
            <h1 class="names" id="coupleNames">
                <span>Rohan</span>
                <span class="amp">&</span>
                <span>Priya</span>
            </h1>
            
            <div class="date-location" id="dateLocation">
                Demo Date • The Royal Heritage
            </div>

            <div class="countdown">
                <div class="time-box"><div class="time-content"><h2 id="days">00</h2><p>Days</p></div></div>
                <div class="time-box"><div class="time-content"><h2 id="hours">00</h2><p>Hours</p></div></div>
                <div class="time-box"><div class="time-content"><h2 id="minutes">00</h2><p>Mins</p></div></div>
                <div class="time-box"><div class="time-content"><h2 id="seconds">00</h2><p>Secs</p></div></div>
            </div>

            <button id="celebrateBtn" class="celebrate-btn">Tap to Celebrate</button>

            <div class="photo-section" id="photoArea">
                <div class="frame">
                    <img id="couplePhoto" src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?auto=format&fit=crop&w=400&q=80" alt="Couple">
                    <div class="frame-text">Save the Date</div>
                </div>
            </div>
        </div>
    </div>

    <div class="demo-nav">
        <button class="nav-btn" onclick="changeDemo(-1)">Prev Demo</button>
        <div class="demo-indicator" id="demoIndicator">Theme 1: Royal</div>
        <button class="nav-btn" onclick="changeDemo(1)">Next Demo</button>
    </div>

    <script>
        // --- DEMO DATA FOR 3 THEMES ---
        const demos = [
            {
                themeClass: 'theme-royal',
                namesHtml: '<span>Rohan</span> <span class="amp">&</span> <span>Priya</span>',
                location: 'The Royal Heritage • Jaipur',
                photo: 'https://images.unsplash.com/photo-1583939003579-730e3918a45a?auto=format&fit=crop&w=600&q=80',
                indicator: 'Theme 1: Royal',
                showPetals: true
            },
            {
                themeClass: 'theme-elegant',
                namesHtml: '<span>Alex</span> <span class="amp">&</span> <span>Taylor</span>',
                location: 'Oceanview Resort • Goa',
                photo: 'https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&w=600&q=80',
                indicator: 'Theme 2: Elegant',
                showPetals: false
            },
            {
                themeClass: 'theme-rustic',
                namesHtml: '<span>Kabir</span> <span class="amp">&</span> <span>Zara</span>',
                location: 'Whispering Pines • Shillong',
                photo: 'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=600&q=80',
                indicator: 'Theme 3: Rustic',
                showPetals: false
            }
        ];

        let currentDemo = 0;

        // --- EVERGREEN RANDOM COUNTDOWN LOGIC ---
        let targetDate = new Date();
        function resetTargetDate() {
            targetDate = new Date();
            const randomDaysAdd = Math.floor(Math.random() * 30) + 15;
            targetDate.setDate(targetDate.getDate() + randomDaysAdd);
            targetDate.setHours(19, 30, 0); 
        }
        
        resetTargetDate();

        function getFormattedDate(dateObj) {
            const options = { month: 'long', day: 'numeric', year: 'numeric' };
            return dateObj.toLocaleDateString('en-US', options);
        }

        function updateUI() {
            const demo = demos[currentDemo];
            document.getElementById('bodyElement').className = demo.themeClass;
            document.getElementById('coupleNames').innerHTML = demo.namesHtml;
            document.getElementById('dateLocation').innerHTML = `${getFormattedDate(targetDate)} <br> ${demo.location}`;
            document.getElementById('couplePhoto').src = demo.photo;
            document.getElementById('demoIndicator').innerText = demo.indicator;
            
            document.getElementById('petal-container').style.display = demo.showPetals ? 'block' : 'none';
        }

        window.changeDemo = function(direction) {
            currentDemo += direction;
            if (currentDemo >= demos.length) currentDemo = 0;
            if (currentDemo < 0) currentDemo = demos.length - 1;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            updateUI();
        };

        // --- COUNTDOWN TIMER LOOP ---
        setInterval(() => {
            const now = new Date().getTime();
            let dist = targetDate.getTime() - now;

            if (dist < 0) {
                resetTargetDate();
                updateUI(); 
                dist = targetDate.getTime() - now;
            }

            document.getElementById("days").innerText = Math.floor(dist / (1000 * 60 * 60 * 24)).toString().padStart(2,'0');
            document.getElementById("hours").innerText = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2,'0');
            document.getElementById("minutes").innerText = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2,'0');
            document.getElementById("seconds").innerText = Math.floor((dist % (1000 * 60)) / 1000).toString().padStart(2,'0');
        }, 1000);


        // --- ROSE PETALS GENERATION ---
        const petalContainer = document.getElementById('petal-container');
        function createPetal() {
            if (document.getElementById('petal-container').style.display === 'none') return;
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * 15 + 20;
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            petal.style.animationDuration = Math.random() * 5 + 8 + 's';
            petalContainer.appendChild(petal);
            setTimeout(() => { petal.remove(); }, 13000);
        }
        setInterval(createPetal, 1000);

        // --- CELEBRATE BUTTON ---
        document.getElementById('celebrateBtn').addEventListener('click', () => {
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, colors: ['#D4AF37', '#ffffff', '#800000'] });
            document.getElementById('photoArea').scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        updateUI();
    </script>
</body>
</html>
